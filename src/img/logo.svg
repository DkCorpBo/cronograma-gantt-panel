<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Borde exterior estilo Grafana azul -->
  <rect x="12" y="12" width="76" height="76" rx="6" fill="none" stroke="#5794F2" stroke-width="4.5" />
  
  <!-- Barras del cronograma Gantt -->
  <!-- Fila 1: Azul -->
  <rect x="20" y="20" width="22" height="7" rx="1.5" fill="#1F60C4" />
  
  <!-- Fila 2: Amarillo / Naranja -->
  <rect x="26" y="31" width="34" height="7" rx="1.5" fill="#FF9800" />
  
  <!-- Fila 3: Azul -->
  <rect x="26" y="42" width="34" height="7" rx="1.5" fill="#1F60C4" />
  
  <!-- Fila 4: Azul desplazado -->
  <rect x="36" y="53" width="34" height="7" rx="1.5" fill="#1F60C4" />
  
  <!-- Fila 5: Azul claro desplazado -->
  <rect x="52" y="64" width="22" height="7" rx="1.5" fill="#5794F2" />
  
  <!-- Fila 6: Amarillo / Naranja desplazado -->
  <rect x="52" y="75" width="22" height="7" rx="1.5" fill="#FF9800" />
</svg>